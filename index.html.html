<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  .title-block { position: relative; z-index: 1; }

  .thought-bubble::after { content: ''; position: absolute; bottom: -12px; left: 20px; width: 10px; height: 12px; background: white; border-right: 2.5px solid #1a1a1a; border-bottom: 2.5px solid #1a1a1a; clip-path: polygon(0 0, 100% 0, 50% 100%); }
  @keyframes bubble-in { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .narration-box { background: #1a0a2e; border-top: 3px solid #c8a84b; border-bottom: 3px solid #c8a84b; padding: 16px 24px; position: relative; overflow: hidden; }

  @keyframes dialog-slide { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .dialog-avatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; overflow: hidden; }
  .dialog-content { background: rgba(255,255,255,0.05); border: 1px solid rgba(200,168,75,0.3); border-radius: 0 12px 12px 12px; padding: 8px 12px; flex: 1; }

  .choices-title { font-size: 10px; color: rgba(200,168,75,0.6); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 12px; text-align: center; }
  .choice-btn { display: block; width: 100%; background: transparent; border: 1px solid rgba(200,168,75,0.4); color: #f0e8d0; padding: 12px 16px; margin-bottom: 8px; text-align: left; cursor: pointer; font-family: 'Noto Serif JP', serif; font-size: 13px; line-height: 1.5; position: relative; transition: all 0.2s; border-radius: 2px; overflow: hidden; }
  .choice-btn::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: #c8a84b; transform: scaleY(0); transition: transform 0.2s; }

  .choice-tag { float: right; font-size: 9px; color: rgba(200,168,75,0.5); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
  .minimap { position: fixed; bottom: 16px; right: 16px; background: rgba(10,6,20,0.95); border: 1px solid rgba(200,168,75,0.4); border-radius: 4px; padding: 8px; font-size: 9px; color: rgba(200,168,75,0.7); z-index: 100; max-width: 140px; }
  .minimap-title { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; color: rgba(200,168,75,0.5); text-align: center; }
  .minimap-node { display: flex; align-items: center; gap: 6px; padding: 2px 0; opacity: 0.4; font-size: 9px; }

  .minimap-node.current .minimap-dot { background: #c8a84b; box-shadow: 0 0 4px #c8a84b; }
  .ending-screen { min-height: 100vh; background: #0a0614; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; text-align: center; animation: ending-fade 1s ease-out; }
  @keyframes ending-fade { from { opacity: 0; } to { opacity: 1; } }
  .ending-label { font-size: 10px; letter-spacing: 4px; color: rgba(200,168,75,0.6); text-transform: uppercase; margin-bottom: 20px; }

  .ending-text { font-size: 14px; line-height: 1.9; color: rgba(240,232,208,0.8); max-width: 500px; margin-bottom: 32px; font-style: italic; }

  @keyframes star-pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } }
  .restart-btn { background: transparent; border: 1px solid #c8a84b; color: #c8a84b; padding: 12px 32px; font-family: 'Noto Serif JP', serif; font-size: 13px; cursor: pointer; letter-spacing: 2px; transition: all 0.2s; border-radius: 2px; margin: 8px; }
  .restart-btn:hover { background: rgba(200,168,75,0.15); }

<script>
const STATE = { current: 'intro', visited: new Set(['intro']), endingsFound: new Set(), totalEndings: 10 };

const SCENES = {
  intro: { title: 'Capítulo I', label: 'El Despertar', bg: drawIntro, thought: '¿Cuánto valdrá hoy el dólar...?', narration: 'En un barrio de Buenos Aires, no ha mucho tiempo, vivía una jubilada de cuyo nombre todos se olvidan... <span class="character-name">Doña Elena de la Mancha</span>. Con su jubilación magra, su televisor encendido y su mente que a veces confundía el presente con batallas del pasado.', dialogs: [{ speaker: 'Doña Elena', avatar: '👵', color: '#c8a84b', text: '¡Hoy es el día! Primero la farmacia, luego el banco... si es que los gigantes me lo permiten.' }, { speaker: 'Su gato Rocinante', avatar: '🐱', color: '#8888cc', text: 'Miau.' }], choices: [{ text: '¡A la farmacia! Los remedios no pueden esperar', icon: '💊', tag: 'urgencia', next: 'farmacia' }, { text: 'Primero el banco. La plata se acaba', icon: '🏦', tag: 'economía', next: 'banco' }, { text: 'Mejor ver las noticias antes de salir', icon: '📺', tag: 'desvío', next: 'noticiero' }] },
  farmacia: { title: 'Nodo II', label: 'La Farmacia Imposible', bg: drawFarmacia, thought: '¡El remedio... se esfumó!', narration: 'La farmacia del barrio se alzaba ante Doña Elena como un castillo encantado. Los precios del cartel brillaban como escudos de caballeros enemigos. El cajero automático dentro... sin efectivo.', dialogs: [{ speaker: 'Empleado (el "Dragón")', avatar: '🐉', color: '#cc4444', text: 'El Enalapril no está en stock, señora. Y el genérico... tampoco. Y la cobertura del PAMI cubre solo el 40%.' }, { speaker: 'Doña Elena', avatar: '👵', color: '#c8a84b', text: '¡Mentira! ¡Son los mismos encantadores que perseguían al buen Cervantes! ¡Esto es un embrujo!' }], choices: [{ text: 'Reclamar con valentía quijotesca', icon: '⚔️', tag: 'lucha', next: 'reclamo_farmacia' }, { text: 'Ir al banco a sacar dinero', icon: '🏦', tag: 'desvío', next: 'banco' }, { text: 'Volver a casa sin remedios', icon: '🏠', tag: 'rendición', next: 'plaza_vacia' }] },
  banco: { title: 'Nodo III', label: 'La Fila Eterna del Banco', bg: drawBanco, thought: 'Esta fila... ¿es real o me hechizaron?', narration: 'La fila del banco se extendía como el ejército del Turco. Veinte personas delante. Un solo cajero. El número del ticket: 847. El número en el display: 812.', dialogs: [{ speaker: 'Vecino en la fila', avatar: '👴', color: '#88aacc', text: 'Llevo dos horas. Dicen que el sistema está caído.' }, { speaker: 'Doña Elena', avatar: '👵', color: '#c8a84b', text: '¡Dos horas! ¡En la batalla de Lepanto tardaron menos! ¡Exijo hablar con el gerente-gobernador!' }, { speaker: 'Guardia de seguridad', avatar: '💂', color: '#558855', text: 'Señora, por favor, no puede pasar la cuerda.' }], choices: [{ text: 'Esperar con estoicismo heroico', icon: '⏳', tag: 'resistencia', next: 'espera_banco' }, { text: 'Ir al cajero automático afuera', icon: '🏧', tag: 'alternativa', next: 'cajero' }, { text: 'Retirarse hacia el colectivo', icon: '🚌', tag: 'huida', next: 'colectivo' }] },
  noticiero: { title: 'Nodo IV', label: 'Las Voces del Televisor', bg: drawNoticiero, thought: '¡Me hablan a mí... directamente a mí!', narration: 'El televisor encendido lanzaba sus conjuros. Economistas, panelistas, políticos: todos hablaban de jubilaciones. Doña Elena sintió que los conductores la miraban fijamente.', dialogs: [{ speaker: 'Voz del televisor', avatar: '📺', color: '#cc8844', text: '"...el ajuste estructural es necesario para la sustentabilidad del sistema previsional..."' }, { speaker: 'Doña Elena', avatar: '👵', color: '#c8a84b', text: '¡Me amenazan! ¡Me llaman por mi nombre en clave! ¡"Elena"... "sustentabilidad"... son señales!' }, { speaker: 'Su vecina Aldonza', avatar: '👩', color: '#aa88cc', text: 'Elena, eso es el canal de noticias, no te hablan a vos...' }], choices: [{ text: 'Apagar el televisor y salir a luchar', icon: '⚔️', tag: 'acción', next: 'farmacia' }, { text: 'Quedarse encerrada creyendo el peligro', icon: '🔒', tag: 'paranoia', next: 'encierro' }, { text: 'Llamar a su hija en Mar del Plata', icon: '📞', tag: 'lucidez', next: 'llamada_hija' }] },
  reclamo_farmacia: { title: 'Nodo V', label: 'El Reclamo Heroico', bg: drawReclamo, thought: '¡Por mis derechos y los de todos!', narration: 'Doña Elena se irguió con la dignidad de un caballero andante. Sacó del bolso su libreta de reclamos del PAMI y la blandió como una espada.', dialogs: [{ speaker: 'Doña Elena', avatar: '👵', color: '#c8a84b', text: '¡Aquí está el número de expediente 4471-B! ¡Tengo derecho al 100% de cobertura según el decreto 2023! ¡Convoco al defensor del pueblo!' }, { speaker: 'Farmacéutica (sorprendida)', avatar: '👩‍⚕️', color: '#55aacc', text: '...tiene razón. Déjeme llamar al supervisor.' }], choices: [{ text: 'El supervisor aprueba la cobertura total', icon: '🏆', tag: 'victoria', next: 'final_victoria' }, { text: 'El sistema sigue sin funcionar', icon: '💔', tag: 'derrota', next: 'remedios_perdidos' }] },
  espera_banco: { title: 'Nodo VI', label: 'La Espera Interminable', bg: drawEspera, thought: 'El tiempo pesa más que el hierro...', narration: 'Cuarenta minutos después. El número avanzó solo cuatro lugares. Doña Elena cerró los ojos y comenzó a recordar cuando cobraba en ventanilla y la conocían por su nombre.', dialogs: [{ speaker: 'Doña Elena (monólogo)', avatar: '👵', color: '#c8a84b', text: 'Antes me decían "señora Elena, ¿cómo están los chicos?". Ahora soy un número. El 847.' }, { speaker: 'Joven con celular', avatar: '🧑', color: '#aaccaa', text: 'Señora, ¿sabe que puede sacar turno por la app? Se hace en dos minutos.' }], choices: [{ text: 'Pedir ayuda con el celular al joven', icon: '📱', tag: 'puente', next: 'final_tecnologia' }, { text: 'Rechazar: "¡Esas máquinas me persiguen!"', icon: '🚫', tag: 'delirio', next: 'cajero' }, { text: 'Sentarse y esperar hasta el final', icon: '⏰', tag: 'resistencia', next: 'final_espera' }] },
  colectivo: { title: 'Nodo VII', label: 'El Colectivo Fantasma', bg: drawColectivo, thought: '¿Pasó ya...? ¿O lo soñé?', narration: 'En la parada, el panel digital mostraba: "142 – 3 min". Luego "142 – 8 min". Luego "142 – No disponible". El colectivo que nunca llegaba.', dialogs: [{ speaker: 'Doña Elena', avatar: '👵', color: '#c8a84b', text: '¡El colectivo es fantasma! ¡Es una ilusión creada por los encantadores de la empresa de transporte!' }, { speaker: 'Señora en la parada', avatar: '👩‍🦳', color: '#ccaacc', text: 'No, mi amor, es que hay un corte en Rivadavia. Pasan por Corrientes.' }, { speaker: 'Doña Elena', avatar: '👵', color: '#c8a84b', text: '¡Rivadavia! ¡El encantador me redirige para separarme de mi destino!' }], choices: [{ text: 'Ir a pie por Corrientes como heroína', icon: '🚶', tag: 'determinación', next: 'plaza_vacia' }, { text: 'Tomar un taxi con el último billete', icon: '🚕', tag: 'sacrificio', next: 'final_taxi' }, { text: 'Regresar a casa vencida', icon: '🏠', tag: 'retirada', next: 'plaza_vacia' }] },
  plaza_vacia: { title: 'Nodo VIII', label: 'La Plaza Vacía', bg: drawPlaza, thought: '¿Dónde está la gente de antes...?', narration: 'La plaza del barrio, que antes bullía de vida, estaba casi desierta. Un banco de madera partido. Las palomas como únicas testigos. Doña Elena se sentó y miró el cielo.', dialogs: [{ speaker: 'Doña Elena (murmullo)', avatar: '👵', color: '#c8a84b', text: 'Aquí traía a mi hija cuando era chica. Había un kiosco. Había músicos los domingos. Había... gente.' }, { speaker: 'Niño en bicicleta', avatar: '👦', color: '#88cccc', text: 'Señora, ¿está bien? ¿Necesita que llame a alguien?' }], choices: [{ text: 'Hablar con el niño sobre el barrio de antes', icon: '💬', tag: 'memoria', next: 'final_memoria' }, { text: 'Levantarse y volver a intentarlo mañana', icon: '🌅', tag: 'esperanza', next: 'final_esperanza' }] },
  cajero: { title: 'Nodo IX', label: 'El Dragón Electrónico', bg: drawCajero, thought: '¡La máquina me come la tarjeta!', narration: 'El cajero parpadeó. "OPERACIÓN NO DISPONIBLE". Segundo intento. "ERROR 404". Tercer intento. La tarjeta quedó dentro. El cajero la devoró.', dialogs: [{ speaker: 'Doña Elena', avatar: '👵', color: '#c8a84b', text: '¡TRAICIÓN! ¡El dragón electrónico me robó el escudo! ¡Mi tarjeta! ¡Alguien que me ayude!' }, { speaker: 'Empleado del banco', avatar: '👨‍💼', color: '#8888aa', text: 'El cajero tiene falla técnica. Debe llamar al 0800 para el reclamo.' }], choices: [{ text: 'Reclamo épico: ir a Defensa al Consumidor', icon: '⚖️', tag: 'lucha', next: 'final_reclamo' }, { text: 'Sentarse en la vereda a llorar', icon: '😢', tag: 'quiebre', next: 'plaza_vacia' }] },
  encierro: { title: 'Nodo X', label: 'El Laberinto Interior', bg: drawEncierro, thought: 'Afuera me esperan... me vigilan...', narration: 'Doña Elena cerró las persianas. Apagó el teléfono. Solo el televisor, que siguió hablando. Cada palabra del noticiero era una amenaza cifrada.', dialogs: [{ speaker: 'Televisor (en su mente)', avatar: '📺', color: '#cc4444', text: '"...inflación... recorte... déficit... ajuste... jubilaciones..."' }, { speaker: 'Doña Elena', avatar: '👵', color: '#c8a84b', text: 'Me conocen. Saben mis remedios. Saben cuánto cobro. Son los mismos molinos de siempre, pero ahora tienen pantalla.' }], choices: [{ text: 'Al tercer día, salir a buscar ayuda', icon: '🚪', tag: 'ruptura', next: 'llamada_hija' }, { text: 'Quedarse en el laberinto', icon: '🌀', tag: 'delirio total', next: 'final_delirio' }] },
  llamada_hija: { title: 'Nodo XI', label: 'La Voz que Rompe el Encanto', bg: drawLlamada, thought: 'Su voz... me recuerda quién soy.', narration: 'El teléfono sonó tres veces. Al otro lado, la voz de su hija Claudia, desde Mar del Plata.', dialogs: [{ speaker: 'Claudia (hija)', avatar: '📱', color: '#88ccaa', text: 'Mamá, ¿cómo estás? ¿Tomaste los remedios? ¿Necesitás algo? Puedo venir el fin de semana.' }, { speaker: 'Doña Elena', avatar: '👵', color: '#c8a84b', text: '...Estoy bien, mi amor. Es solo que el mundo se puso muy difícil para los que somos como yo.' }, { speaker: 'Claudia (hija)', avatar: '📱', color: '#88ccaa', text: 'Mamá, tenés razón. Pero no estás sola, ¿entendés? No estás sola.' }], choices: [{ text: 'Organizar una visita y enfrentar el mundo juntas', icon: '❤️', tag: 'amor', next: 'final_reencuentro' }, { text: 'Cortar y volver al delirio televisivo', icon: '📺', tag: 'recaída', next: 'encierro' }] },
  remedios_perdidos: { title: 'Nodo XII', label: 'Los Remedios Perdidos', bg: drawRemedios, thought: '¿Dónde están mis pastillas...?', narration: 'Sin remedios, Doña Elena buscó en cada cajón. Encontró una caja con fecha vencida de 2021. Y una nota de su médico de cabecera que ya no atiende más.', dialogs: [{ speaker: 'Doña Elena', avatar: '👵', color: '#c8a84b', text: 'El doctor Méndez. Se fue a Canadá. La guardia del hospital es un campo de batalla. ¿Quién me cuida ahora?' }, { speaker: 'Vecina (desde el pasillo)', avatar: '👩', color: '#cc88aa', text: 'Elena, mi cuñada es médica. Te puedo dar el teléfono.' }], choices: [{ text: 'Aceptar la ayuda de la vecina', icon: '🤝', tag: 'comunidad', next: 'final_solidaridad' }, { text: 'Tomar los remedios vencidos igual', icon: '💊', tag: 'desesperación', next: 'final_delirio' }] },
  final_victoria: { isEnding: true, star: '⚔️', title: 'Final I: La Victoria de Doña Elena', text: 'El supervisor aprobó la cobertura total. El empleado, avergonzado, entregó los remedios. Doña Elena salió de la farmacia con la cabeza erguida y el bastón apuntando al cielo como una espada. "¡Se puede!", gritó en la vereda. Tres vecinos aplaudieron sin saber muy bien por qué. Pero aplaudieron.' },
  final_tecnologia: { isEnding: true, star: '📱', title: 'Final II: El Puente Digital', text: 'El joven le instaló la app del banco en diez minutos. Doña Elena cobró su jubilación sin moverse de la silla de plástico. "Esto me da miedo todavía", dijo. "Pero sirve". El joven se fue corriendo a su trabajo. Doña Elena guardó el teléfono y pensó: el mundo cambió, pero la gente buena queda.' },
  final_memoria: { isEnding: true, star: '🕊️', title: 'Final III: Lo Que Quedó', text: 'Le contó al niño sobre el kiosco del señor Beto, sobre los músicos del domingo, sobre la plaza llena. El niño escuchó con ojos grandes. "¿Por qué ya no hay eso?". Doña Elena no supo responder. Pero algo en ella se alivió: alguien había escuchado. La memoria no se pierde mientras haya quien quiera oírla.' },
  final_esperanza: { isEnding: true, star: '🌅', title: 'Final IV: Mañana Será Otro Día', text: 'Se levantó del banco de madera. Se acomodó el tapado. Miró el cielo porteño, ese cielo que no cambia aunque todo lo demás cambie. Mañana iría a la farmacia más temprano. Mañana llevaría el DNI y el carnet del PAMI. Por ahora, caminó hacia casa, y el barrio la saludó como siempre: con indiferencia tibia y cierto amor sin nombre.' },
  final_solidaridad: { isEnding: true, star: '🤝', title: 'Final V: La Red Invisible', text: 'La médica vino esa misma tarde. Le recetó el genérico correcto, le explicó la cobertura, le dejó su WhatsApp. Doña Elena no entendía muy bien el WhatsApp, pero guardó el número en la agenda de papel. Así descubrió que el sistema sanitario también falla, pero la gente del barrio —esa red invisible— todavía sostiene.' },
  final_reencuentro: { isEnding: true, star: '❤️', title: 'Final VI: Lo Único Real', text: 'Claudia llegó el sábado con medialunas y paciencia. Fueron juntas a la farmacia, al banco, al médico. Todo fue más fácil con alguien al lado que conoce los formularios. Al final del día, tomaron mate en la cocina. Los gigantes seguían ahí. Pero Doña Elena no estaba sola para enfrentarlos.' },
  final_taxi: { isEnding: true, star: '🚕', title: 'Final VII: El Último Billete', text: 'Gastó los últimos quinientos pesos en el taxi. Llegó a la farmacia a tiempo. Cobró, compró los remedios, volvió caminando seis cuadras. Llegó a casa con los pies hinchados y sin un peso. Pero con los remedios. Y una extraña sensación de haber ganado algo, aunque nadie supiera exactamente qué.' },
  final_reclamo: { isEnding: true, star: '⚖️', title: 'Final VIII: La Quijota del Siglo XXI', text: 'Presentó el reclamo en Defensa al Consumidor. Le dieron un número de expediente. Le dijeron que tardaría entre 30 y 90 días hábiles. No importó. Doña Elena volvió a casa con su copia firmada y sellada, y la pegó en la heladera junto a las fotos de sus nietos. Sabía que quizás no cambiaría nada. Pero alguien, en algún expediente, había escrito su nombre.' },
  final_espera: { isEnding: true, star: '⏰', title: 'Final IX: La Persistencia', text: 'Esperó dos horas y cuarenta minutos. La atendieron. Cobró su jubilación. Salió al sol de las tres de la tarde sintiéndose, por alguna razón, invencible. No era la primera fila eterna. No sería la última. Pero ella siempre llegaba al final. Eso nadie podía quitárselo.' },
  final_delirio: { isEnding: true, star: '🌀', title: 'Final X: El Laberinto Sin Salida', text: 'El televisor siguió hablando. Los días pasaron. La jubilación llegó acreditada pero Doña Elena no salió a gastarla. El gato maullaba. Los remedios se acabaron. Afuera, el barrio siguió sin saber que adentro, una señora que fue fuerte toda su vida, estaba perdida en un laberinto que no ella construyó.\n\n—Este final existe para ser visto. Para que alguien, en algún lugar, llame a quien vive solo.' }
};

function drawBase(ctx,W,H,s='#c8d8f0',g='#e8e0d0'){ctx.fillStyle=s;ctx.fillRect(0,0,W,H);ctx.fillStyle=g;ctx.fillRect(0,H*.6,W,H*.4);ctx.strokeStyle='rgba(0,0,0,0.04)';ctx.lineWidth=0.5;for(let i=0;i<W;i+=8){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,H);ctx.stroke();}}
function drawElena(ctx,x,y,scale=1,emotion='normal'){ctx.save();ctx.translate(x,y);ctx.scale(scale,scale);ctx.fillStyle='#5a4a7a';ctx.fillRect(-18,-60,36,55);ctx.fillStyle='#7a5a9a';ctx.fillRect(-22,-55,44,50);ctx.fillStyle='#f5d5b5';ctx.beginPath();ctx.ellipse(0,-80,20,22,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#e8e8e8';ctx.beginPath();ctx.ellipse(0,-88,18,12,0,0,Math.PI*2);ctx.fill();ctx.fillRect(-20,-88,40,10);if(emotion==='fury'){ctx.fillStyle='#1a1a1a';ctx.fillRect(-8,-78,5,4);ctx.fillRect(3,-78,5,4);ctx.strokeStyle='#1a1a1a';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(-10,-82);ctx.lineTo(-4,-79);ctx.stroke();ctx.moveTo(10,-82);ctx.lineTo(4,-79);ctx.stroke();}else if(emotion==='sad'){ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.arc(-6,-76,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(6,-76,3,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#1a1a1a';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,-68,8,0.2,Math.PI-0.2);ctx.stroke();}else{ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.arc(-6,-76,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(6,-76,3,0,Math.PI*2);ctx.fill();}ctx.strokeStyle='#6b4c2a';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(20,-10);ctx.lineTo(24,30);ctx.stroke();ctx.beginPath();ctx.arc(20,-12,4,0,Math.PI*2);ctx.stroke();ctx.restore();}
function drawGiant(ctx,x,y,type='farmacia',scale=1){ctx.save();ctx.translate(x,y);ctx.scale(scale,scale);const colors={farmacia:['#2a6a3a','#1a4a2a'],banco:['#4a3a2a','#2a2010'],super:['#aa4422','#882200'],tv:['#1a1a3a','#000018']};const[c1,c2]=colors[type]||colors.farmacia;ctx.fillStyle=c1;ctx.fillRect(-40,-120,80,130);ctx.fillStyle=c2;ctx.fillRect(-40,-120,80,20);ctx.fillStyle='#ffff88';ctx.fillRect(-25,-100,18,20);ctx.fillRect(7,-100,18,20);ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.arc(0,-65,15,0,Math.PI);ctx.fill();ctx.strokeStyle=c1;ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(-40,-70);ctx.lineTo(-70,-40);ctx.stroke();ctx.restore();}
function drawIntro(ctx,W,H){drawBase(ctx,W,H,'#d4c8e8','#c4b8a8');ctx.fillStyle='#b8a890';ctx.fillRect(50,H*.4,180,H*.35);ctx.fillStyle='#8a6a5a';ctx.beginPath();ctx.moveTo(40,H*.4);ctx.lineTo(140,H*.22);ctx.lineTo(240,H*.4);ctx.closePath();ctx.fill();ctx.fillStyle='#ffffcc';ctx.fillRect(130,H*.45,40,35);drawElena(ctx,W*.7,H*.72,1.3,'normal');ctx.fillStyle='#888888';ctx.beginPath();ctx.ellipse(W*.75,H*.82,15,10,0,0,Math.PI*2);ctx.fill();ctx.fillRect(W*.72,H*.72,6,12);ctx.fillRect(W*.76,H*.72,6,12);for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;ctx.strokeStyle='rgba(200,168,75,0.15)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(W*.7,H*.5);ctx.lineTo(W*.7+Math.cos(a)*200,H*.5+Math.sin(a)*150);ctx.stroke();}}
function drawFarmacia(ctx,W,H){drawBase(ctx,W,H,'#c8d8e8','#d0c8b8');drawGiant(ctx,W*.6,H*.62,'farmacia',1.4);drawElena(ctx,W*.25,H*.72,1.2,'fury');ctx.fillStyle='#ffffff';ctx.fillRect(W*.53,H*.18,14,45);ctx.fillRect(W*.48,H*.26,24,14);['$8.400','$12.200','$5.900'].forEach((p,i)=>{ctx.fillStyle='rgba(200,50,50,0.9)';ctx.font='bold 11px monospace';ctx.fillText(p,W*.38+i*60,H*.32+i*18);});}
function drawBanco(ctx,W,H){drawBase(ctx,W,H,'#ddd8c8','#c8c0a8');const fila=['👴','👩','🧑','👵','👨','👩‍🦳','👦','👩‍🦰','👨‍🦳','🧓'];ctx.font='20px sans-serif';fila.forEach((e,i)=>{ctx.fillText(e,20+i*62,H*.7);});drawGiant(ctx,W*.85,H*.55,'banco',1.2);drawElena(ctx,W*.15,H*.72,1.1,'fury');ctx.fillStyle='#001100';ctx.fillRect(W*.4,H*.28,120,40);ctx.fillStyle='#00ff44';ctx.font='bold 16px monospace';ctx.fillText('TURNO 812',W*.41,H*.31+18);ctx.fillStyle='#aa4400';ctx.font='bold 11px monospace';ctx.fillText('TU TICKET: 847',W*.41,H*.31+30);}
function drawNoticiero(ctx,W,H){drawBase(ctx,W,H,'#1a1a2a','#0a0a18');ctx.fillStyle='#2a2030';ctx.fillRect(0,H*.55,W,H*.45);ctx.fillStyle='#1a1a3a';ctx.fillRect(W*.25,H*.15,W*.5,H*.4);ctx.strokeStyle='#444488';ctx.lineWidth=3;ctx.strokeRect(W*.25,H*.15,W*.5,H*.4);const g=ctx.createLinearGradient(W*.27,H*.17,W*.73,H*.52);g.addColorStop(0,'#1a3a6a');g.addColorStop(1,'#0a1a3a');ctx.fillStyle=g;ctx.fillRect(W*.27,H*.17,W*.46,H*.36);ctx.fillStyle='#f5d5b5';ctx.beginPath();ctx.ellipse(W*.5,H*.3,30,35,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.arc(W*.5-10,H*.28,5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(W*.5+10,H*.28,5,0,Math.PI*2);ctx.fill();drawElena(ctx,W*.5,H*.78,1.0,'sad');for(let i=0;i<5;i++){const a=Math.PI*.3+i*Math.PI*.08;ctx.strokeStyle='rgba(100,150,255,0.2)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(W*.5,H*.35);ctx.lineTo(W*.5+Math.cos(a)*180,H*.35+Math.sin(a)*180);ctx.stroke();}}
function drawReclamo(ctx,W,H){drawBase(ctx,W,H,'#c8d4c0','#d0c8a8');ctx.fillStyle='#b8a888';ctx.fillRect(W*.45,H*.4,W*.5,H*.35);ctx.fillStyle='#8a7a60';ctx.fillRect(W*.45,H*.38,W*.5,8);drawElena(ctx,W*.3,H*.72,1.2,'fury');ctx.fillStyle='#f5f0e0';ctx.fillRect(W*.38,H*.42,12,45);ctx.fillStyle='#c8a84b';ctx.fillRect(W*.35,H*.46,18,4);ctx.fillStyle='#5a8a7a';ctx.fillRect(W*.65,H*.48,30,40);ctx.fillStyle='#f5d5b5';ctx.beginPath();ctx.arc(W*.68,H*.44,16,0,Math.PI*2);ctx.fill();for(let i=0;i<12;i++){const a=(i/12)*Math.PI*2;ctx.strokeStyle='rgba(200,168,75,0.3)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(W*.35,H*.55);ctx.lineTo(W*.35+Math.cos(a)*250,H*.55+Math.sin(a)*200);ctx.stroke();}}
function drawEspera(ctx,W,H){drawBase(ctx,W,H,'#d0c8c0','#c8c0b0');ctx.fillStyle='#a89878';ctx.fillRect(0,H*.65,W,8);[0.15,0.3,0.45,0.6,0.75].forEach(x=>{ctx.fillStyle='#8a7a60';ctx.fillRect(W*x,H*.6,35,30);ctx.fillRect(W*x,H*.5,35,12);});['#888888','#6a8a7a','#8a6a9a'].forEach((c,i)=>{ctx.fillStyle=c;ctx.fillRect(W*(.15+i*.15)+5,H*.52,25,28);ctx.fillStyle='#e5c5a5';ctx.beginPath();ctx.arc(W*(.15+i*.15)+17,H*.48,12,0,Math.PI*2);ctx.fill();});drawElena(ctx,W*.65,H*.65,1.1,'sad');ctx.strokeStyle='#443322';ctx.lineWidth=2;ctx.beginPath();ctx.arc(W*.5,H*.2,25,0,Math.PI*2);ctx.stroke();ctx.fillStyle='#f5f0e5';ctx.fill();ctx.strokeStyle='#221100';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(W*.5,H*.2);ctx.lineTo(W*.5,H*.2-18);ctx.stroke();ctx.beginPath();ctx.moveTo(W*.5,H*.2);ctx.lineTo(W*.5+14,H*.2);ctx.stroke();}
function drawColectivo(ctx,W,H){drawBase(ctx,W,H,'#c0c8d8','#c8c0a8');ctx.fillStyle='#888880';ctx.fillRect(0,H*.68,W,H*.15);ctx.strokeStyle='#ffffcc';ctx.setLineDash([20,15]);ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,H*.75);ctx.lineTo(W,H*.75);ctx.stroke();ctx.setLineDash([]);ctx.globalAlpha=0.25;ctx.fillStyle='#cc4400';ctx.fillRect(W*.55,H*.45,180,75);ctx.fillStyle='#ffcc00';ctx.fillRect(W*.57,H*.48,25,20);ctx.fillRect(W*.62,H*.48,25,20);ctx.globalAlpha=1;ctx.fillStyle='#001100';ctx.fillRect(W*.05,H*.22,130,35);ctx.fillStyle='#ff4400';ctx.font='bold 12px monospace';ctx.fillText('142 – NO DISP.',W*.06,H*.22+22);drawElena(ctx,W*.2,H*.72,1.1,'fury');}
function drawPlaza(ctx,W,H){drawBase(ctx,W,H,'#d8e8d0','#c8d8a8');ctx.fillStyle='#8a6a4a';ctx.fillRect(W*.2,H*.62,200,12);ctx.fillRect(W*.22,H*.62,12,25);ctx.fillRect(W*.4,H*.62,12,25);ctx.fillRect(W*.56,H*.62,12,20);ctx.strokeStyle='#5a4a3a';ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(W*.75,H*.7);ctx.lineTo(W*.75,H*.2);ctx.stroke();ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(W*.75,H*.35);ctx.lineTo(W*.88,H*.25);ctx.stroke();ctx.beginPath();ctx.moveTo(W*.75,H*.42);ctx.lineTo(W*.62,H*.32);ctx.stroke();['#aaaaaa','#999999','#bbbbbb'].forEach((c,i)=>{ctx.fillStyle=c;ctx.beginPath();ctx.ellipse(W*.3+i*50,H*.78,10,6,0,0,Math.PI*2);ctx.fill();});drawElena(ctx,W*.35,H*.7,1.0,'sad');ctx.fillStyle='#4a6a9a';ctx.beginPath();ctx.arc(W*.62,H*.74,10,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(W*.55,H*.74,10,0,Math.PI*2);ctx.fill();ctx.fillRect(W*.54,H*.64,18,14);ctx.fillStyle='#f5d5b5';ctx.beginPath();ctx.arc(W*.59,H*.6,9,0,Math.PI*2);ctx.fill();}
function drawCajero(ctx,W,H){drawBase(ctx,W,H,'#c8c4c0','#b8b0a8');ctx.fillStyle='#3a3a3a';ctx.fillRect(W*.35,H*.15,160,H*.55);ctx.fillStyle='#1a1a1a';ctx.fillRect(W*.37,H*.18,156,H*.3);ctx.fillStyle='#cc0000';ctx.fillRect(W*.39,H*.2,152,H*.28);ctx.fillStyle='#ffffff';ctx.font='bold 14px monospace';ctx.fillText('ERROR 404',W*.41,H*.32);ctx.font='10px monospace';ctx.fillText('OPERACIÓN',W*.41,H*.36);ctx.fillText('NO DISPONIBLE',W*.41,H*.39);ctx.fillStyle='#111111';ctx.fillRect(W*.44,H*.57,80,8);drawElena(ctx,W*.22,H*.72,1.1,'fury');['#ff4400','#ff8800','#ffcc00'].forEach((c,i)=>{ctx.strokeStyle=c;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(W*.35,H*.4);const a=Math.PI*.7+i*.3;ctx.lineTo(W*.35+Math.cos(a)*80,H*.4+Math.sin(a)*60);ctx.stroke();});}
function drawEncierro(ctx,W,H){drawBase(ctx,W,H,'#1a1420','#0a0810');for(let i=0;i<8;i++){ctx.fillStyle=i%2===0?'#3a3040':'#2a2030';ctx.fillRect(0,i*(H/8),W,H/8);}ctx.fillStyle='rgba(255,220,100,0.1)';ctx.fillRect(W*.3,0,8,H);ctx.fillStyle='#000020';ctx.fillRect(W*.15,H*.1,W*.65,H*.45);const g=ctx.createRadialGradient(W*.48,H*.32,10,W*.48,H*.32,150);g.addColorStop(0,'rgba(80,120,200,0.4)');g.addColorStop(1,'rgba(10,10,40,0.8)');ctx.fillStyle=g;ctx.fillRect(W*.17,H*.12,W*.61,H*.41);drawElena(ctx,W*.5,H*.82,1.0,'sad');}
function drawLlamada(ctx,W,H){drawBase(ctx,W,H,'#d0e0d0','#c0d0b8');ctx.fillStyle='#c8b088';ctx.fillRect(0,H*.6,W,H*.4);ctx.fillStyle='#a89060';ctx.fillRect(0,H*.6,W,8);ctx.fillStyle='#1a1a1a';ctx.fillRect(W*.55,H*.42,80,140);ctx.fillStyle='#88ffaa';ctx.fillRect(W*.59,H*.47,72,100);ctx.fillStyle='#f5d5b5';ctx.beginPath();ctx.arc(W*.62,H*.56,20,0,Math.PI*2);ctx.fill();ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.arc(W*.61,H*.55,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(W*.67,H*.55,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(W*.62,H*.59,8,0,Math.PI);ctx.fill();drawElena(ctx,W*.28,H*.72,1.1,'normal');ctx.strokeStyle='rgba(136,255,170,0.4)';ctx.setLineDash([5,5]);ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(W*.38,H*.55);ctx.lineTo(W*.55,H*.6);ctx.stroke();ctx.setLineDash([]);}
function drawRemedios(ctx,W,H){drawBase(ctx,W,H,'#d8d0c8','#c8c0b0');ctx.fillStyle='#8a6a4a';ctx.fillRect(W*.1,H*.5,W*.8,15);[0.15,0.4,0.65].forEach(x=>{ctx.fillStyle='#a87a5a';ctx.fillRect(W*x,H*.5,W*.2,40);ctx.fillStyle='#6a4a2a';ctx.fillRect(W*x+W*.09,H*.59,6,4);});['#4a8a4a','#8a4a8a','#cc8844','#4a4a8a'].forEach((c,i)=>{ctx.fillStyle=c;ctx.fillRect(W*.12+i*80,H*.38,55,12);ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='7px monospace';ctx.fillText('VTO: 2021',W*.13+i*80,H*.38+9);});drawElena(ctx,W*.5,H*.72,1.1,'sad');}

function getProgress(){const t=Object.keys(SCENES).filter(k=>!SCENES[k].isEnding).length;return Math.min(STATE.visited.size/t,1);}
function updateMinimap(){const nodes=document.getElementById('minimap-nodes');const mm=document.getElementById('minimap');if(!nodes||!mm)return;mm.style.display='block';const rel=['intro','farmacia','banco','noticiero','reclamo_farmacia','espera_banco','colectivo','plaza_vacia','cajero','encierro','llamada_hija','remedios_perdidos'];nodes.innerHTML=rel.map(id=>{const s=SCENES[id];if(!s)return'';const cls=STATE.current===id?'current':STATE.visited.has(id)?'visited':'';return`<div class="minimap-node ${cls}"><div class="minimap-dot"></div>${s.label||id}</div>`;}).join('');}
function renderScene(sceneId){const scene=SCENES[sceneId];if(!scene)return;STATE.current=sceneId;STATE.visited.add(sceneId);if(scene.isEnding){STATE.endingsFound.add(sceneId);renderEnding(scene);return;}const app=document.getElementById('scene-wrapper');const progress=getProgress();app.innerHTML=`<div class="scene-container"><div class="manga-header"><div class="title-block"><div class="title-main">Doña Elena de la Mancha</div><div class="title-sub">Hipertexto visual · Buenos Aires · 2025</div></div><div class="chapter-badge">${scene.title}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${progress*100}%"></div></div><div class="panel-main"><canvas class="panel-canvas" id="scene-canvas" style="height:340px;width:100%"></canvas>${scene.thought?`<div class="thought-bubble">${scene.thought}</div>`:''}</div><div class="narration-box"><div class="narration-text">${scene.narration}</div></div><div class="dialog-panel">${(scene.dialogs||[]).map(d=>`<div class="dialog-bubble"><div class="dialog-avatar" style="border-color:${d.color};background:${d.color}22;font-size:20px">${d.avatar}</div><div class="dialog-content"><div class="dialog-speaker" style="color:${d.color}">${d.speaker}</div><div class="dialog-text">${d.text}</div></div></div>`).join('')}</div><div class="choices-panel"><div class="choices-title">◆ ¿Qué hace Doña Elena? ◆</div>${(scene.choices||[]).map(c=>`<button class="choice-btn" onclick="navigate('${c.next}')"><span class="choice-icon">${c.icon}</span>${c.text}<span class="choice-tag">${c.tag}</span></button>`).join('')}</div></div>`;setTimeout(()=>{const canvas=document.getElementById('scene-canvas');if(canvas&&scene.bg){canvas.width=canvas.offsetWidth;canvas.height=340;const ctx=canvas.getContext('2d');scene.bg(ctx,canvas.width,canvas.height);}updateMinimap();},50);}
function renderEnding(scene){const app=document.getElementById('scene-wrapper');const endCount=STATE.endingsFound.size;app.innerHTML=`<div class="ending-screen"><div class="ending-label">Fin del recorrido</div><div class="ending-star">${scene.star}</div><div class="ending-title">${scene.title}</div><div class="ending-text">${scene.text.replace(/\n/g,'<br>')}</div><div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center"><button class="restart-btn" onclick="navigate('intro')">↺ Comenzar de nuevo</button><button class="restart-btn" onclick="navigate('farmacia')">→ La Farmacia</button><button class="restart-btn" onclick="navigate('banco')">→ El Banco</button><button class="restart-btn" onclick="navigate('noticiero')">→ El Noticiero</button></div><div class="endings-count">Finales descubiertos: ${endCount} / 10</div></div>`;document.getElementById('minimap').style.display='none';}
function navigate(sceneId){const tr=document.getElementById('transition');const tt=document.getElementById('transition-text');const labels={farmacia:'La farmacia imposible...',banco:'La fila eterna del banco...',noticiero:'Las voces del televisor...',colectivo:'El colectivo fantasma...',plaza_vacia:'La plaza vacía...',llamada_hija:'Una voz conocida...',encierro:'El laberinto interior...',remedios_perdidos:'Los remedios perdidos...',cajero:'El dragón electrónico...',reclamo_farmacia:'El reclamo heroico...',espera_banco:'La espera interminable...',final_victoria:'¡Victoria!',final_tecnologia:'El puente digital...',final_memoria:'Lo que quedó...',final_esperanza:'Mañana será otro día...',final_solidaridad:'La red invisible...',final_reencuentro:'Lo único real...',final_taxi:'El último billete...',final_reclamo:'La quijota del siglo XXI...',final_espera:'La persistencia...',final_delirio:'El laberinto sin salida...',intro:'El inicio de la aventura...'};tt.textContent=labels[sceneId]||'...';tr.classList.add('active');setTimeout(()=>{renderScene(sceneId);tr.classList.remove('active');},600);}
renderScene('intro');
</script>
